# =============================================================================
# Loki Configuration
# =============================================================================
# Log aggregation system configuration
# =============================================================================

# Authentication disabled for internal use
auth_enabled: false

server:
  # HTTP listen port
  http_listen_port: 3100
  # gRPC listen port
  grpc_listen_port: 9096
  # Log level
  log_level: info

# Common configuration shared across components
common:
  # Instance address for ring membership
  instance_addr: 127.0.0.1
  # Storage path
  path_prefix: /loki
  # Storage configuration
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  # Replication factor for single-node deployment
  replication_factor: 1
  # Ring configuration
  ring:
    kvstore:
      store: inmemory

# Query range configuration
query_range:
  # Enable result caching
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

# Schema configuration - defines how logs are stored
schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Ruler configuration for alerting
ruler:
  # Alertmanager URL
  alertmanager_url: http://alertmanager:9093
  # Storage for rules
  storage:
    type: local
    local:
      directory: /loki/rules
  # Rule evaluation interval
  rule_path: /loki/rules-temp
  # Enable alerting
  enable_api: true

# Ingester configuration
ingester:
  # Write-ahead log configuration
  wal:
    enabled: true
    dir: /loki/wal
  # Lifecycle configuration
  lifecycler:
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
    final_sleep: 0s
  # Chunk configuration
  chunk_idle_period: 1h
  max_chunk_age: 1h
  chunk_target_size: 1048576
  chunk_retain_period: 30s

# Limits configuration
limits_config:
  # Reject old samples
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  # Ingestion rate limits
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20
  # Max streams per user
  max_streams_per_user: 10000
  # Max label names per series
  max_label_names_per_series: 30
  # Query limits
  max_query_parallelism: 32
  # Retention period
  retention_period: 744h

# Table manager - manages index tables
table_manager:
  retention_deletes_enabled: true
  retention_period: 744h

# Compactor configuration
compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem
