# =============================================================================
# Blackbox Exporter Configuration
# =============================================================================
# Probe modules for HTTP, TCP, ICMP, and DNS checks
# =============================================================================

modules:
  # ---------------------------------------------------------------------------
  # HTTP Probes
  # ---------------------------------------------------------------------------

  # Basic HTTP 2xx check
  http_2xx:
    prober: http
    timeout: 10s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200, 201, 202, 204]
      method: GET
      follow_redirects: true
      fail_if_ssl: false
      fail_if_not_ssl: false
      tls_config:
        insecure_skip_verify: false
      preferred_ip_protocol: "ip4"
      ip_protocol_fallback: true

  # HTTPS check with SSL verification
  https_2xx:
    prober: http
    timeout: 10s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200, 201, 202, 204]
      method: GET
      follow_redirects: true
      fail_if_ssl: false
      fail_if_not_ssl: true
      tls_config:
        insecure_skip_verify: false
      preferred_ip_protocol: "ip4"

  # HTTP POST check
  http_post_2xx:
    prober: http
    timeout: 10s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200, 201, 202, 204]
      method: POST
      headers:
        Content-Type: application/json
      follow_redirects: true
      preferred_ip_protocol: "ip4"

  # HTTP check allowing 3xx redirects
  http_2xx_3xx:
    prober: http
    timeout: 10s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200, 201, 202, 204, 301, 302, 303, 307, 308]
      method: GET
      follow_redirects: false
      preferred_ip_protocol: "ip4"

  # HTTP basic auth check
  http_basic_auth:
    prober: http
    timeout: 10s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200]
      method: GET
      # Basic auth credentials - configure as needed
      # basic_auth:
      #   username: "user"
      #   password: "password"
      preferred_ip_protocol: "ip4"

  # ---------------------------------------------------------------------------
  # TCP Probes
  # ---------------------------------------------------------------------------

  # Basic TCP connection check
  tcp_connect:
    prober: tcp
    timeout: 10s
    tcp:
      preferred_ip_protocol: "ip4"
      ip_protocol_fallback: true

  # TCP with TLS
  tcp_tls:
    prober: tcp
    timeout: 10s
    tcp:
      preferred_ip_protocol: "ip4"
      tls: true
      tls_config:
        insecure_skip_verify: false

  # SSH banner check
  ssh_banner:
    prober: tcp
    timeout: 10s
    tcp:
      preferred_ip_protocol: "ip4"
      query_response:
        - expect: "^SSH-2.0-"

  # ---------------------------------------------------------------------------
  # ICMP Probes
  # ---------------------------------------------------------------------------

  # Basic ICMP ping
  icmp:
    prober: icmp
    timeout: 10s
    icmp:
      preferred_ip_protocol: "ip4"
      ip_protocol_fallback: true

  # ICMP with specific source
  icmp_ttl5:
    prober: icmp
    timeout: 10s
    icmp:
      preferred_ip_protocol: "ip4"
      ttl: 5

  # ---------------------------------------------------------------------------
  # DNS Probes
  # ---------------------------------------------------------------------------

  # DNS A record query
  dns_a:
    prober: dns
    timeout: 10s
    dns:
      query_name: "example.com"
      query_type: "A"
      valid_rcodes:
        - NOERROR
      preferred_ip_protocol: "ip4"

  # DNS TCP query
  dns_tcp:
    prober: dns
    timeout: 10s
    dns:
      transport_protocol: "tcp"
      query_name: "example.com"
      query_type: "A"
      preferred_ip_protocol: "ip4"
