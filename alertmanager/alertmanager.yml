# =============================================================================
# Alertmanager Configuration
# =============================================================================
# Routes alerts to appropriate receivers (email, Slack, webhook, etc.)
# =============================================================================

global:
  # ResolveTimeout is the time after which an alert is declared resolved
  # if it has not been updated
  resolve_timeout: 5m

  # SMTP settings for email notifications
  # Uncomment and configure for email alerts
  # smtp_smarthost: 'smtp.gmail.com:587'
  # smtp_from: 'alertmanager@example.com'
  # smtp_auth_username: 'alertmanager@example.com'
  # smtp_auth_password: 'your-app-password'
  # smtp_require_tls: true

  # Slack API URL for Slack notifications
  # Uncomment and configure for Slack alerts
  # slack_api_url: 'https://hooks.slack.com/services/xxx/yyy/zzz'

# The root route - all alerts enter here
route:
  # Default receiver
  receiver: 'default-receiver'

  # Group alerts by these labels
  group_by: ['alertname', 'severity', 'instance']

  # Wait before sending notification for a group
  group_wait: 30s

  # Interval between notifications for a group
  group_interval: 5m

  # Interval before resending notification
  repeat_interval: 4h

  # Child routes for specific alert routing
  routes:
    # Critical alerts - send immediately
    - match:
        severity: critical
      receiver: 'critical-receiver'
      group_wait: 10s
      repeat_interval: 1h
      continue: true

    # Warning alerts
    - match:
        severity: warning
      receiver: 'warning-receiver'
      group_wait: 1m
      repeat_interval: 4h

    # Blackbox probe alerts
    - match:
        job: blackbox-http
      receiver: 'probe-receiver'
      group_by: ['instance']
      group_wait: 30s

# Inhibition rules - suppress certain alerts when others are firing
inhibit_rules:
  # If critical is firing, suppress warning for same alertname/instance
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

  # If host is down, suppress all other alerts for that host
  - source_match:
      alertname: 'HostDown'
    target_match_re:
      alertname: '.+'
    equal: ['instance']

# Receivers define notification integrations
receivers:
  # Default receiver - logs to stdout (for development)
  - name: 'default-receiver'
    webhook_configs:
      - url: 'http://localhost:5001/webhook'
        send_resolved: true
        # This webhook doesn't exist - alerts will be logged
        # Replace with your actual webhook endpoint

  # Critical alerts receiver
  - name: 'critical-receiver'
    # Uncomment and configure your preferred notification method
    # email_configs:
    #   - to: 'oncall@example.com'
    #     send_resolved: true
    #     headers:
    #       Subject: '[CRITICAL] {{ .GroupLabels.alertname }}'
    # slack_configs:
    #   - channel: '#alerts-critical'
    #     send_resolved: true
    #     title: '{{ .Status | toUpper }}: {{ .GroupLabels.alertname }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
    webhook_configs:
      - url: 'http://localhost:5001/webhook/critical'
        send_resolved: true

  # Warning alerts receiver
  - name: 'warning-receiver'
    # Uncomment and configure your preferred notification method
    # email_configs:
    #   - to: 'team@example.com'
    #     send_resolved: true
    # slack_configs:
    #   - channel: '#alerts-warning'
    #     send_resolved: true
    webhook_configs:
      - url: 'http://localhost:5001/webhook/warning'
        send_resolved: true

  # Probe alerts receiver
  - name: 'probe-receiver'
    webhook_configs:
      - url: 'http://localhost:5001/webhook/probe'
        send_resolved: true

# Templates for notification formatting
# templates:
#   - '/etc/alertmanager/templates/*.tmpl'
