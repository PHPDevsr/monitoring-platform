# =============================================================================
# Release Pipeline - Monitoring Platform
# =============================================================================
# Tag-triggered release cycle (no pull-request permission required).
#
# When you push a version tag (v*, e.g. v1.0.0) this workflow:
#   1. Regenerates CHANGELOG.md from the full Conventional-Commit history using
#      git-cliff (cliff.toml, Keep a Changelog format) and commits it to master.
#   2. Extracts the section for the pushed tag and creates a GitHub Release
#      with those notes.
#
# This avoids the "Allow GitHub Actions to create and approve pull requests"
# repo setting, which is not available here. It only needs contents: write.
#
# Usage:  git tag -a v1.0.0 -m "chore: release v1.0.0" && git push origin v1.0.0
# =============================================================================

name: Release

on:
  push:
    tags:
      - "v*"
  # Manual trigger; supply a tag name to run the release for that tag.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0)"
        required: true

permissions:
  contents: write   # commit CHANGELOG.md back to master + create the release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Generate changelog and release
    runs-on: ubuntu-latest
    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout (full history)
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          ref: master

      - name: Install git-cliff
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        id: cliff
        with:
          config: cliff.toml
          args: --output CHANGELOG.md
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Show generated changelog
        run: cat CHANGELOG.md

      - name: Commit CHANGELOG.md to master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changelog changes to commit."
          else
            git commit -m "docs(changelog): update for ${{ steps.tag.outputs.name }}"
            git push origin master
          fi

      - name: Build release notes for this tag
        id: notes
        run: |
          # Extract this version's section from the already-generated CHANGELOG.md.
          # The first "## [x.y.z]" block is the newest release (or Unreleased).
          # Skip the header, grab from the first ## [...] line to just before the next.
          awk '
            /^## \[/ { if (found) exit; found=1 }
            found { print }
          ' CHANGELOG.md > /tmp/release_body.md
          echo "--- release body ---"
          cat /tmp/release_body.md
          echo "path=/tmp/release_body.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          body_path: ${{ steps.notes.outputs.path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
