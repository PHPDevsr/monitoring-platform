# =============================================================================
# Prometheus Configuration
# =============================================================================
# Global settings and scrape configurations for all monitoring targets
# =============================================================================

global:
  # How frequently to scrape targets by default
  scrape_interval: 15s
  # How frequently to evaluate rules
  evaluation_interval: 15s
  # Attach these labels to any time series or alerts when communicating with
  # external systems (federation, remote storage, Alertmanager)
  external_labels:
    monitor: 'monitoring-platform'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
      # Timeout for alertmanager communication
      timeout: 10s

# Load rules once and periodically evaluate them
rule_files:
  - /etc/prometheus/alert.rules.yml

# Scrape configurations
scrape_configs:
  # ---------------------------------------------------------------------------
  # Prometheus self-monitoring
  # ---------------------------------------------------------------------------
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus'
    # Override global scrape interval for self-monitoring
    scrape_interval: 10s

  # ---------------------------------------------------------------------------
  # Node Exporter - Host system metrics
  # ---------------------------------------------------------------------------
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: 'monitoring-host'
    # Relabel to add friendly instance name
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - target_label: job
        replacement: 'node'

  # ---------------------------------------------------------------------------
  # cAdvisor - Container metrics
  # ---------------------------------------------------------------------------
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          instance: 'monitoring-host'
    # Filter out unnecessary high-cardinality metrics
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'container_(network_tcp_usage_total|network_udp_usage_total|tasks_state|cpu_cfs_.*)'
        action: drop

  # ---------------------------------------------------------------------------
  # Alertmanager
  # ---------------------------------------------------------------------------
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
        labels:
          instance: 'alertmanager'

  # ---------------------------------------------------------------------------
  # Grafana
  # ---------------------------------------------------------------------------
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
        labels:
          instance: 'grafana'

  # ---------------------------------------------------------------------------
  # Loki
  # ---------------------------------------------------------------------------
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
        labels:
          instance: 'loki'

  # ---------------------------------------------------------------------------
  # Blackbox Exporter - HTTP/HTTPS/TCP/ICMP probes
  # ---------------------------------------------------------------------------
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          # Add your HTTP endpoints to monitor here
          - https://www.google.com
          - https://prometheus.io
        labels:
          probe_type: 'http'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # ---------------------------------------------------------------------------
  # Blackbox Exporter - Internal service checks
  # ---------------------------------------------------------------------------
  - job_name: 'blackbox-internal'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://prometheus:9090/-/healthy
          - http://grafana:3000/api/health
          - http://alertmanager:9093/-/healthy
        labels:
          probe_type: 'internal'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
